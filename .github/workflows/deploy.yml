name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "cf-pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch match data
        run: node scripts/fetch-data.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Build with Astro
        run: npx astro build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=best-evaulthub --branch=main

      - name: Ping IndexNow
        run: |
          curl -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d '{
              "host": "deportesenvivo.live",
              "key": "${{ secrets.INDEXNOW_KEY }}",
              "keyLocation": "https://deportesenvivo.live/${{ secrets.INDEXNOW_KEY }}.txt",
              "urlList": [
                "https://deportesenvivo.live/",
                "https://deportesenvivo.live/futbol-libre/",
                "https://deportesenvivo.live/pirlo-tv/",
                "https://deportesenvivo.live/tarjeta-roja/",
                "https://deportesenvivo.live/partidos-de-hoy/",
                "https://deportesenvivo.live/futbol-en-vivo/",
                "https://deportesenvivo.live/partidos-en-vivo/",
                "https://deportesenvivo.live/champions-league/",
                "https://deportesenvivo.live/laliga/",
                "https://deportesenvivo.live/liga-mx/",
                "https://deportesenvivo.live/copa-libertadores/",
                "https://deportesenvivo.live/nba-en-vivo/",
                "https://deportesenvivo.live/about/",
                "https://deportesenvivo.live/alternativas-rojadirecta/",
                "https://deportesenvivo.live/alternativas-pirlo-tv/"
              ]
            }' || true
